<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pager — Organizer</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6c47ff" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
    h1 span { color: #6c47ff; }

    .card {
      width: 100%;
      max-width: 480px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #qr-wrapper {
      display: flex;
      justify-content: center;
    }

    #qr-wrapper canvas, #qr-wrapper img {
      border-radius: 8px;
    }

    .attendee-url {
      font-size: 0.8rem;
      color: #666;
      word-break: break-all;
      text-align: center;
    }

    textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #6c47ff; }

    button {
      background: #6c47ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:not(:disabled):hover { opacity: 0.85; }

    #blast-status {
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
      color: #888;
    }

    #blast-status.ok  { color: #4caf50; }
    #blast-status.err { color: #f44336; }

    #error-banner {
      color: #f44336;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Pa<span>g</span>er <small style="font-size:0.55em;color:#666">organizer</small></h1>

  <p id="error-banner" hidden></p>

  <div class="card" id="qr-card">
    <h2>Attendee QR code</h2>
    <div id="qr-wrapper"><img id="qr-img" alt="Attendee QR code" style="border-radius:8px;display:none" /></div>
    <p class="attendee-url" id="attendee-url"></p>
  </div>

  <div class="card">
    <h2>Blast a message</h2>
    <textarea id="message-input" placeholder="Doors open at 7 pm — grab a seat!"></textarea>
    <button id="blast-btn" disabled>Send to everyone</button>
    <p id="blast-status"></p>
  </div>

  <script>
    // Read channel ID and organizer token from the URL.
    // Expected format: /organizer?c=CHANNEL_ID&t=ORGANIZER_TOKEN
    const params   = new URLSearchParams(location.search);
    const channelId = params.get("c");
    const token     = params.get("t");

    const errorBanner   = document.getElementById("error-banner");
    const blastBtn      = document.getElementById("blast-btn");
    const blastStatus   = document.getElementById("blast-status");
    const messageInput  = document.getElementById("message-input");
    const qrWrapper     = document.getElementById("qr-wrapper");
    const attendeeUrlEl = document.getElementById("attendee-url");

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.hidden = false;
    }

    if (!channelId || !token) {
      showError("Missing channel ID or organizer token in URL.");
    } else {
      init();
    }

    async function init() {
      // Verify channel exists before showing the UI.
      const res = await fetch(`/channel/${channelId}`);
      if (!res.ok) {
        showError("Channel not found.");
        return;
      }

      // Build and render the attendee URL as a QR code (served as PNG from the API).
      const attendeeUrl = `${location.origin}/channel/${channelId}`;
      attendeeUrlEl.textContent = attendeeUrl;

      const qrImg = document.getElementById("qr-img");
      qrImg.src = `/channel/${channelId}/qr`;
      qrImg.style.display = "block";

      blastBtn.disabled = false;
    }

    blastBtn.addEventListener("click", async () => {
      const message = messageInput.value.trim();
      if (!message) return;

      blastBtn.disabled = true;
      blastStatus.className = "";
      blastStatus.textContent = "Sending…";

      try {
        const res = await fetch(`/channel/${channelId}/blast`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Organizer-Token": token,
          },
          body: JSON.stringify({ message }),
        });

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `HTTP ${res.status}`);
        }

        blastStatus.className = "ok";
        blastStatus.textContent = "Sent ✓";
        messageInput.value = "";
      } catch (err) {
        blastStatus.className = "err";
        blastStatus.textContent = `Failed: ${err.message}`;
      } finally {
        blastBtn.disabled = false;
      }
    });

    // Allow Cmd/Ctrl+Enter to send.
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) blastBtn.click();
    });
  </script>
</body>
</html>
